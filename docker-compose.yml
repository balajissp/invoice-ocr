services:
  db:
    image: postgres:18-alpine
    container_name: invoice-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-invoice_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/temporal
    mem_limit: 1g
    container_name: temporal
    ports:
      - "7233:7233"
      - "8233:8233"
    command: server start-dev --ip 0.0.0.0
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7233"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  temporal-worker:
    build: .
    container_name: temporal-worker
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_HOST=temporal
      - TEMPORAL_PORT=7233
    command: python invoiceocr/workflows/worker.py
    volumes:
      - shared_uploads:/app/.temp

  app:
    build: .
    container_name: invoice-app
    environment:
      DATABASE_URL: ${POSTGRES_URL}
      TMP_DIR: ${TMP_DIR:-/tmp/invoices}
    ports:
      - "${FASTAPI_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      temporal:
        condition: service_healthy
    volumes:
      - ./:/app
      - shared_uploads:/app/.temp

  tests:
    build: .
    container_name: invoice-tests
    command: python -m pytest tests/test_api.py -v
    environment:
      DATABASE_URL: ${POSTGRES_URL}
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    volumes:
      - ./:/app
      - shared_uploads:/app/.temp

volumes:
  postgres_data:
  shared_uploads: